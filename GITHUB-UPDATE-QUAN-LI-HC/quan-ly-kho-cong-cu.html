function clone(x){return JSON.parse(JSON.stringify(x))}function mergeByKey(current,defs,keyIndex){current=Array.isArray(current)?current:[];defs.forEach(function(d){if(!current.some(function(x){return x&&x[keyIndex]===d[keyIndex]}))current.push(d)});return current}function migrateState(s){s=s||{};s.kho=mergeByKey(s.kho,defaults.kho,0);s.hang=mergeByKey(s.hang,defaults.hang,0);s.nhomHangList=Array.from(new Set((s.nhomHangList||[]).concat(defaults.nhomHangList)));s.dvtList=Array.from(new Set((s.dvtList||[]).concat(defaults.dvtList)));s.loaiNhapList=Array.from(new Set((s.loaiNhapList||[]).concat(defaults.loaiNhapList)));s.loaiXuatList=Array.from(new Set((s.loaiXuatList||[]).concat(defaults.loaiXuatList)));s.nccList=Array.from(new Set((s.nccList||[]).concat(defaults.nccList)));s.ton=Object.assign({},defaults.ton,s.ton||{});s.bd=Array.isArray(s.bd)?s.bd:clone(defaults.bd);s.chuyen=Array.isArray(s.chuyen)?s.chuyen:[];s.thietBiIT=mergeByKey(s.thietBiIT,defaults.thietBiIT,0);return s}function loadState(){try{return migrateState(Object.assign(clone(defaults),JSON.parse(localStorage.getItem('qlkho-state')||'{}')))}catch(e){return migrateState(clone(defaults))}}function save(){localStorage.setItem('qlkho-state',JSON.stringify(state))}function el(id){return document.getElementById(id)}function fmt(n){return new Intl.NumberFormat('vi-VN').format(n)}function nameKho(c){var f=state.kho.find(function(x){return x[0]===c});return f?f[1]:c}function item(c){return normalizeHang(state.hang.find(function(x){return x[0]===c})||[c,c,'','',''])}function fill(sel,arr){sel.innerHTML=arr.map(function(x){return '<option value="'+x[0]+'">'+x[1]+'</option>'}).join('')}function fillText(sel,arr){sel.innerHTML=arr.map(function(x){return '<option value="'+x+'">'+x+'</option>'}).join('')}function td(label,val,cls){return '<td data-label="'+label+'" class="'+(cls||'')+'">'+val+'</td>'}

function stockSearchSuggestions(){var seen={};var out=[];stockRows().forEach(function(r){[nameKho(r[0]),r[1],r[2][1],r[2][2],r[2][3]].forEach(function(v){if(v&&!seen[v]){seen[v]=true;out.push(v)}})});return out}function screenTon(){var rows=stockRows().map(function(r){var text=[nameKho(r[0]),r[1],r[2][1],r[2][2],r[2][3],String(r[3])].join(' ').toLowerCase();return '<tr data-search="'+text.replace(/"/g,'')+'">'+td('Kho',nameKho(r[0]))+td('Mã hàng',r[1])+td('Tên hàng',r[2][1])+td('Nhóm',r[2][2])+td('ĐVT',r[2][3])+td('Tồn',fmt(r[3]),'num')+td('Trạng thái','<span class="tag">Đang theo dõi</span>')+'</tr>'}).join('');var opts=stockSearchSuggestions().map(function(x){return '<option value="'+x+'"></option>'}).join('');return shell('ton','Tồn kho','Tìm nhanh theo kho, mã hàng, tên hàng, nhóm hàng hoặc đơn vị tính.','<div class="panel"><div class="head"><h2>Tìm kiếm tồn kho</h2><button class="btn" id="xoaTimTon" type="button">Xóa tìm</button></div><div class="body form"><label class="full">Search tất cả<input id="timTon" list="goiYTon" placeholder="Nhập mã hàng, tên hàng, kho, nhóm hàng..."><datalist id="goiYTon">'+opts+'</datalist></label></div></div><div class="panel"><div class="head"><h2>Bảng tồn kho</h2><span class="tag" id="soDongTon"></span></div><div class="wrap"><table><thead><tr><th>Kho</th><th>Mã hàng</th><th>Tên hàng</th><th>Nhóm</th><th>ĐVT</th><th>Tồn</th><th>Trạng thái</th></tr></thead><tbody id="tonRowsBody">'+rows+'</tbody></table></div></div>')}

function khoCoTonTheoHang(maHang){return state.kho.filter(function(k){return (state.ton[k[0]+'|'+maHang]||0)>0}).map(function(k){return [k[0],k[1]+' - tồn '+fmt(state.ton[k[0]+'|'+maHang]||0)]})}function capNhatKhoXuatTheoHang(){if(!el('hangXuat')||!el('khoXuat'))return;var ma=el('hangXuat').value;var ds=khoCoTonTheoHang(ma);if(ds.length){fill(el('khoXuat'),ds);if(el('goiYKhoXuat'))el('goiYKhoXuat').textContent='Chỉ hiển thị kho còn tồn của hàng đã chọn.'}else{el('khoXuat').innerHTML='';if(el('goiYKhoXuat'))el('goiYKhoXuat').textContent='Hàng này hiện chưa có tồn ở kho nào.'}}function bindForms(){['khoNhap','khoNhan'].forEach(function(id){if(el(id))fill(el(id),state.kho)});['hangNhap','hangXuat'].forEach(function(id){if(el(id))fill(el(id),state.hang.map(function(x){var h=normalizeHang(x);return [h[0],h[0]+' - '+h[1]]}))});if(el('hangXuat')){el('hangXuat').onchange=capNhatKhoXuatTheoHang;capNhatKhoXuatTheoHang();}if(el('nhomHang'))fillText(el('nhomHang'),state.nhomHangList);if(el('nhapNhomHangMoi'))fillText(el('nhapNhomHangMoi'),state.nhomHangList);if(el('dvt'))fillText(el('dvt'),state.dvtList);if(el('nhapDvtMoi'))fillText(el('nhapDvtMoi'),state.dvtList);if(el('loaiNhap'))fillText(el('loaiNhap'),state.loaiNhapList);if(el('nccNhap'))fillText(el('nccNhap'),state.nccList);if(el('loaiXuat'))fillText(el('loaiXuat'),state.loaiXuatList);bindKho('');bindKho('set');if(el('hangThietBi'))fill(el('hangThietBi'),itItems().length?itItems():state.hang.map(function(x){return [x[0],x[0]+' - '+x[1]]}));if(el('nguonThietBi'))fillText(el('nguonThietBi'),state.loaiNhapList.concat(['Điều chuyển nội bộ','Khác']));if(el('luuThietBi'))el('luuThietBi').onclick=saveThietBi;if(el('huyThietBi'))el('huyThietBi').onclick=resetThietBi;if(el('luuHang'))el('luuHang').onclick=saveHang;if(el('huyHang'))el('huyHang').onclick=resetHang;if(el('batHangMoi'))el('batHangMoi').onclick=function(){var box=el('hangMoiBox');var show=box.style.display==='none';box.style.display=show?'block':'none';el('hangNhap').disabled=show;el('batHangMoi').textContent=show?'Chọn hàng có sẵn':'+ Tạo hàng hóa mới'};if(el('luuNhap'))el('luuNhap').onclick=saveNhap;if(el('luuXuat'))el('luuXuat').onclick=saveXuat;if(el('luuNhom'))el('luuNhom').onclick=saveNhom;if(el('huyNhom'))el('huyNhom').onclick=resetNhom;if(el('luuDvt'))el('luuDvt').onclick=saveDvt;if(el('huyDvt'))el('huyDvt').onclick=resetDvt;if(el('dayOnline'))el('dayOnline').onclick=dayDuLieuOnline;if(el('taiOnline'))el('taiOnline').onclick=taiDuLieuOnline;if(el('xoaDuLieuCu'))el('xoaDuLieuCu').onclick=xoaDuLieuCu;if(el('capNhatDuLieu'))el('capNhatDuLieu').onclick=capNhatDuLieuMau;if(el('luuBaoMat'))el('luuBaoMat').onclick=saveBaoMat;if(el('luuNcc'))el('luuNcc').onclick=saveNcc;if(el('huyNcc'))el('huyNcc').onclick=resetNcc;if(el('luuLoai'))el('luuLoai').onclick=saveLoai;if(el('huyLoai'))el('huyLoai').onclick=resetLoai;if(current==='ton')bindSearchTon();if(current==='baocao')showReport('xnk')}
function bindSearchTon(){var input=el('timTon'),clear=el('xoaTimTon'),badge=el('soDongTon');if(!input)return;function apply(){var q=input.value.trim().toLowerCase();var rows=[].slice.call(document.querySelectorAll('#tonRowsBody tr'));var shown=0;rows.forEach(function(r){var ok=!q||r.getAttribute('data-search').indexOf(q)>=0;r.style.display=ok?'':'none';if(ok)shown++});if(badge)badge.textContent=shown+' dòng'}input.oninput=apply;if(clear)clear.onclick=function(){input.value='';apply();input.focus()};apply()}function bindKho(p){if(el(p+'luuKho'))el(p+'luuKho').onclick=function(){saveKho(p)};if(el(p+'huyKho'))el(p+'huyKho').onclick=function(){resetKho(p)}}function saveKho(p){if(!el(p+'maKho').value||!el(p+'tenKho').value)return alert('Nhập mã kho và tên kho');var i=el(p+'editKho').value;if(i==='')state.kho.push([el(p+'maKho').value,el(p+'tenKho').value,el(p+'ptKho').value||'Chưa gán']);else{state.kho[Number(i)][1]=el(p+'tenKho').value;state.kho[Number(i)][2]=el(p+'ptKho').value||'Chưa gán'}save();render()}function resetKho(p){[p+'editKho',p+'maKho',p+'tenKho',p+'ptKho'].forEach(function(id){if(el(id))el(id).value=''});if(el(p+'maKho'))el(p+'maKho').disabled=false}function editKho(i){go('kho');setTimeout(function(){fillKho('',i)},0)}function editKhoSetup(i){fillKho('set',i)}function fillKho(p,i){el(p+'editKho').value=i;el(p+'maKho').value=state.kho[i][0];el(p+'maKho').disabled=true;el(p+'tenKho').value=state.kho[i][1];el(p+'ptKho').value=state.kho[i][2]}
function editHang(i){var h=normalizeHang(state.hang[i]);el('editHang').value=i;el('maHang').value=h[0];el('maHang').disabled=true;el('tenHang').value=h[1];el('nhomHang').value=h[2];el('dvt').value=h[3];el('thuocTinh').value=h[4]}function resetHang(){['editHang','maHang','tenHang','thuocTinh'].forEach(function(id){el(id).value=''});el('maHang').disabled=false}function saveHang(){if(!el('maHang').value||!el('tenHang').value)return alert('Nhập mã hàng và tên hàng');var row=[el('maHang').value,el('tenHang').value,el('nhomHang').value,el('dvt').value,el('thuocTinh').value];var i=el('editHang').value;if(i==='')state.hang.push(row);else state.hang[Number(i)]=row;save();render()}

<script>

(function(){

    var nguoi=prompt('Chuyển thiết bị '+serial+' cho ai sử dụng?', old==='Trong kho'?'':old);

    x[0]=serial;x[1]=serial;x[5]=nguoi;x[6]='Đang sử dụng';
    var note='Chuyển từ '+old+' sang '+nguoi+' ngày '+today;
    x[7]=x[7] ? x[7]+' | '+note : note;
    state.thietBiIT[i]=x;
    save();render();
  };
  window.traVeKhoThietBi=function(i){
    if(!state.thietBiIT||!state.thietBiIT[i])return;
    var x=normalizeThietBi(state.thietBiIT[i]);
    var old=x[5]||'Trong kho';
    if(!confirm('Chuyển thiết bị '+serialOfQuick(x)+' về kho?'))return;
    x[0]=serialOfQuick(x);x[1]=serialOfQuick(x);x[5]='Kho IT';x[6]='Trong kho';
    var note='Thu hồi từ '+old+' về kho ngày '+today;
    x[7]=x[7] ? x[7]+' | '+note : note;
    state.thietBiIT[i]=x;
    save();render();
  };
  window.screenThietBi=function(){
    var rows=(state.thietBiIT||[]).map(function(raw,i){
      var x=normalizeThietBi(raw), h=item(x[2]), serial=serialOfQuick(x);
      var actions='<div class="row-actions"><button class="btn small" onclick="chuyenNguoiDungThietBi('+i+')">Chuyển người dùng</button><button class="btn small" onclick="traVeKhoThietBi('+i+')">Về kho</button><button class="btn small" onclick="editThietBi('+i+')">Sửa</button></div>';
      return '<tr>'+td('Số seri',serial)+td('Thiết bị',h[1])+td('Nguồn nhập',x[3])+td('Ngày nhập',x[4])+td('Đang sử dụng bởi',x[5])+td('Trạng thái','<span class="tag">'+x[6]+'</span>')+td('Ghi chú',x[7]||'')+td('Thao tác', actions)+'</tr>'
    }).join('')||'<tr><td class="empty" colspan="8">Chưa có thiết bị IT theo số seri.</td></tr>';
    return shell('thietbi','Thiết bị IT theo số seri','Theo dõi và chuyển nhanh thiết bị giữa người dùng/phòng ban.','<div class="grid"><div class="panel"><div class="head"><h2>Danh sách thiết bị</h2></div><div class="wrap"><table><thead><tr><th>Số seri</th><th>Thiết bị</th><th>Nguồn nhập</th><th>Ngày nhập</th><th>Đang sử dụng bởi</th><th>Trạng thái</th><th>Ghi chú</th><th>Thao tác</th></tr></thead><tbody>'+rows+'</tbody></table></div></div><div class="panel"><div class="head"><h2>Thông tin thiết bị</h2></div><div class="body form"><input id="editThietBi" type="hidden"><label class="full">Số seri thiết bị<input id="maThietBi" placeholder="Nhập số seri trên máy/tem thiết bị"></label><input id="seriThietBi" type="hidden"><label>Mặt hàng IT<select id="hangThietBi"></select></label><label>Nguồn nhập<select id="nguonThietBi"></select></label><label>Ngày nhập<input id="ngayThietBi" type="date" value="'+today+'"></label><label>Người đang sử dụng<input id="nguoiDungThietBi" placeholder="Tên nhân viên/phòng ban/kho"></label><label>Trạng thái<select id="trangThaiThietBi"><option>Trong kho</option><option>Đang sử dụng</option><option>Đang sửa chữa</option><option>Thanh lý</option><option>Thất lạc</option></select></label><label class="full">Ghi chú<input id="ghiChuThietBi" placeholder="Cấu hình, tình trạng, chứng từ..."></label><button class="btn primary" id="luuThietBi">Lưu thiết bị</button><button class="btn" id="huyThietBi">Tạo mới</button></div></div></div>')
  };
})();
</script>

<script id="employee-users-patch-20260703">
window.__employeeUsersPatch=true;
(function(){
  function ensureUsers(){
    if(!state.users||!Array.isArray(state.users))state.users=[];
    if(!state.users.some(function(u){return u.username==='admin'})){
      state.users.unshift({username:'admin',password:(window.auth&&auth.pass)||'admin123',name:'Quản trị viên',role:'Admin',active:true});
    }
    state.users.forEach(function(u){if(typeof u.active==='undefined')u.active=true;if(!u.name)u.name=u.username;if(!u.role)u.role='Nhân viên'});
  }
  var oldMigrate=window.migrateState;
  if(typeof oldMigrate==='function'){
    window.migrateState=function(s){s=oldMigrate(s);if(!s.users||!Array.isArray(s.users))s.users=[];if(!s.users.some(function(u){return u.username==='admin'}))s.users.unshift({username:'admin',password:'admin123',name:'Quản trị viên',role:'Admin',active:true});return s};
  }
  ensureUsers();
  window.currentUser=null;
  window.login=function(){
    ensureUsers();
    var u=el('loginUser').value.trim();
    var p=el('loginPass').value;
    var found=state.users.find(function(x){return x.username===u&&x.password===p&&x.active!==false});
    if(!found && window.auth && u===auth.user&&p===auth.pass){found={username:u,password:p,name:'Quản trị viên',role:'Admin',active:true}}
    if(found){
      window.currentUser=found;
      isLoggedIn=true;
      sessionStorage.setItem('qlkho-login','1');
      sessionStorage.setItem('qlkho-user',found.username);
      if(el('loginRemember')&&el('loginRemember').checked){localStorage.setItem('qlhc-remember-login',JSON.stringify({user:u,pass:p,remember:true}))}else{localStorage.removeItem('qlhc-remember-login');if(el('loginPass'))el('loginPass').value=''}
      if(el('loginError'))el('loginError').textContent='';
      showLogin();render();
    }else{if(el('loginError'))el('loginError').textContent='Sai tài khoản hoặc mật khẩu'}
  };
  window.logout=function(){isLoggedIn=false;window.currentUser=null;sessionStorage.removeItem('qlkho-login');sessionStorage.removeItem('qlkho-user');showLogin()};
  window.bindAuth=function(){
    var savedLogin=null;try{savedLogin=JSON.parse(localStorage.getItem('qlhc-remember-login')||'null')}catch(e){savedLogin=null}
    if(savedLogin&&savedLogin.remember){
      if(el('loginUser'))el('loginUser').value=savedLogin.user||'';
      if(el('loginPass'))el('loginPass').value=savedLogin.pass||'';
      if(el('loginRemember'))el('loginRemember').checked=true;
    }
    if(el('loginRemember'))el('loginRemember').onchange=function(){if(!this.checked)localStorage.removeItem('qlhc-remember-login')};
    if(el('loginBtn'))el('loginBtn').onclick=login;
    if(el('loginPass'))el('loginPass').onkeydown=function(e){if(e.key==='Enter')login()};
  };  function userRows(){ensureUsers();return state.users.map(function(u,i){return '<tr>'+td('Tên đăng nhập',u.username)+td('Họ tên',u.name||'')+td('Vai trò',u.role||'Nhân viên')+td('Trạng thái',u.active===false?'<span class="tag bad">Khóa</span>':'<span class="tag">Hoạt động</span>')+td('Thao tác','<div class="row-actions"><button class="btn small" onclick="editUser('+i+')">Sửa</button><button class="btn small" onclick="toggleUser('+i+')">'+(u.active===false?'Mở':'Khóa')+'</button></div>')+'</tr>'}).join('')}
  window.editUser=function(i){ensureUsers();var u=state.users[i];if(!u)return;el('editUserIndex').value=i;el('userName').value=u.username;el('userName').disabled=false;el('userFullName').value=u.name||'';el('userPass').value=u.password||'';el('userRole').value=u.role||'Nhân viên';el('userActive').checked=u.active!==false};
  window.resetUser=function(){['editUserIndex','userName','userFullName','userPass'].forEach(function(id){if(el(id))el(id).value=''});if(el('userName'))el('userName').disabled=false;if(el('userRole'))el('userRole').value='Nhân viên';if(el('userActive'))el('userActive').checked=true};
  window.toggleUser=function(i){ensureUsers();var u=state.users[i];if(!u)return;if(u.username==='admin'&&u.active!==false)return alert('Không nên khóa tài khoản admin');u.active=!(u.active!==false);save();render()};
  window.saveUser=function(){
    ensureUsers();
    var idx=el('editUserIndex').value;
    var username=el('userName').value.trim();
    var name=el('userFullName').value.trim()||username;
    var pass=el('userPass').value.trim();
    var role=el('userRole').value;
    var active=el('userActive').checked;
    if(!username)return alert('Nhập tên đăng nhập');
    if(!pass||pass.length<4)return alert('Mật khẩu nên có ít nhất 4 ký tự');
    if(idx===''){
      if(state.users.some(function(u){return u.username===username}))return alert('Tên đăng nhập đã tồn tại');
      state.users.push({username:username,password:pass,name:name,role:role,active:active});
    }else{
      var oldUser=state.users[Number(idx)];
      if(state.users.some(function(u,j){return j!==Number(idx)&&u.username===username}))return alert('Tên đăng nhập đã tồn tại');
      state.users[Number(idx)]={username:username,password:pass,name:name,role:role,active:active};
      if(window.currentUser&&oldUser&&window.currentUser.username===oldUser.username){window.currentUser=state.users[Number(idx)];sessionStorage.setItem('qlkho-user',username)}
      if(oldUser&&oldUser.username==='admin'&&window.auth){auth.user=username;auth.pass=pass;saveAuth()}
    }    save();render();
  };
  var oldBind=window.bindForms;
  window.bindForms=function(){oldBind();if(el('luuUser'))el('luuUser').onclick=saveUser;if(el('huyUser'))el('huyUser').onclick=resetUser};
  var oldSettings=window.screenThietLap;
  window.screenThietLap=function(){
    ensureUsers();
    var html=oldSettings();
    if(html.indexOf('Tài khoản nhân viên')>=0)return html;
    var panel='<div class="panel"><div class="head"><h2>Tài khoản nhân viên</h2></div><div class="body form"><input id="editUserIndex" type="hidden"><label>Tên đăng nhập<input id="userName" placeholder="VD: nguyenvana"></label><label>Mật khẩu<input id="userPass" placeholder="Tối thiểu 4 ký tự"></label><label>Họ tên<input id="userFullName" placeholder="Tên nhân viên/phòng ban"></label><label>Vai trò<select id="userRole"><option>Nhân viên</option><option>Admin</option></select></label><label class="full"><input id="userActive" type="checkbox" checked> Tài khoản đang hoạt động</label><button class="btn primary" id="luuUser">Lưu tài khoản</button><button class="btn" id="huyUser">Tạo mới</button></div><div class="wrap"><table><thead><tr><th>Tên đăng nhập</th><th>Họ tên</th><th>Vai trò</th><th>Trạng thái</th><th>Thao tác</th></tr></thead><tbody>'+userRows()+'</tbody></table></div></div>';
    return html.replace('<div class="two">',panel+'<div class="two">');
  };
  var oldSaveBaoMat=window.saveBaoMat;
  window.saveBaoMat=function(){
    oldSaveBaoMat();
    ensureUsers();
    var admin=state.users.find(function(u){return u.username==='admin'});
    if(admin&&window.auth){admin.password=auth.pass;admin.name='Quản trị viên';admin.role='Admin';admin.active=true;save()}
  };
})();
</script>

<script id="role-permission-patch-20260703">
window.__rolePermissionPatch=true;
(function(){
  function currentRole(){
    if(window.currentUser&&window.currentUser.role)return window.currentUser.role;
    var u=sessionStorage.getItem('qlkho-user');
    if(u&&state.users){var found=state.users.find(function(x){return x.username===u});if(found){window.currentUser=found;return found.role||'Nhân viên'}}
    return 'Admin';
  }
  window.isAdmin=function(){return currentRole()==='Admin'};
  var allowedStaff=['tongquan','ton','nhap','xuat','thietbi','chuyen','baocao'];
  var oldGo=window.go;
  window.go=function(id){
    if(!isAdmin()&&allowedStaff.indexOf(id)<0){alert('Tài khoản nhân viên không có quyền vào mục này');return}
    oldGo(id);
  };
  window.buildNav=function(){
    var navItems=isAdmin()?nav:nav.filter(function(n){return allowedStaff.indexOf(n[0])>=0});
    var mobileItems=isAdmin()?mobile:mobile.filter(function(n){return allowedStaff.indexOf(n[0])>=0});
    var side=document.getElementById('sideNav');
    if(side)side.innerHTML=navItems.map(function(n){return '<button class="nav '+(current===n[0]?'active':'')+'" onclick="go(\''+n[0]+'\')">'+n[1]+'</button>'}).join('');
    var mb=document.getElementById('mobileNav');
    if(mb)mb.innerHTML=mobileItems.map(function(n){return '<button class="'+(current===n[0]?'active':'')+'" onclick="go(\''+n[0]+'\')">'+n[1]+'</button>'}).join('');
  };
  var oldRender=window.render;
  window.render=function(){
    if(!isAdmin()&&allowedStaff.indexOf(current)<0)current='tongquan';
    oldRender();
  };
  var oldSettings=window.screenThietLap;
  window.screenThietLap=function(){
    if(!isAdmin())return shell('thietlap','Không có quyền','Tài khoản nhân viên không được vào phần thiết lập.','<div class="panel"><div class="body">Vui lòng liên hệ Admin nếu cần thay đổi danh mục hoặc tài khoản.</div></div>');
    return oldSettings();
  };
  var oldHang=window.screenHang;
  window.screenHang=function(){
    if(!isAdmin())return shell('hanghoa','Không có quyền','Tài khoản nhân viên không được sửa danh mục hàng hóa.','<div class="panel"><div class="body">Vui lòng liên hệ Admin nếu cần thêm hoặc sửa hàng hóa.</div></div>');
    return oldHang();
  };
})();
</script>

<script id="change-my-password-patch-20260703">
window.__changeMyPasswordPatch=true;
(function(){
  window.doiMatKhauCuaToi=function(){
    if(!state.users||!Array.isArray(state.users))state.users=[];
    var username=(window.currentUser&&window.currentUser.username)||sessionStorage.getItem('qlkho-user')||(window.auth&&auth.user)||'admin';
    var user=state.users.find(function(u){return u.username===username});
    if(!user&&window.auth&&username===auth.user){user={username:auth.user,password:auth.pass,name:'Quản trị viên',role:'Admin',active:true};state.users.unshift(user)}
    var old=el('myOldPass').value;
    var p1=el('myNewPass').value.trim();
    var p2=el('myNewPass2').value.trim();
    if(!user)return alert('Không tìm thấy tài khoản hiện tại');
    if(old!==user.password)return alert('Mật khẩu hiện tại không đúng');
    if(!p1||p1.length<4)return alert('Mật khẩu mới nên có ít nhất 4 ký tự');
    if(p1!==p2)return alert('Nhập lại mật khẩu mới chưa khớp');
    user.password=p1;
    if(window.auth&&username===auth.user){auth.pass=p1;saveAuth()}

  };
  var oldBind=window.bindForms;

    return html.replace('<div class="two">',panel+'<div class="two">');
  };
})();
</script>

<script id="settings-collapse-patch-20260703">
window.__settingsCollapsePatch=true;
(function(){
  function applySettingsCollapse(){
    var screen=document.getElementById('thietlap');
    if(!screen)return;
    if(!screen.querySelector('.settings-note')){
      var top=screen.querySelector('.top');
      if(top)top.insertAdjacentHTML('afterend','<div class="settings-note">Bấm từng tiêu đề để mở phần cần chỉnh</div>');
    }
    var panels=[].slice.call(screen.querySelectorAll('.panel'));
    panels.forEach(function(p,i){
      if(p.getAttribute('data-settings-ready')==='1')return;
      p.setAttribute('data-settings-ready','1');
      if(i>1)p.classList.add('settings-collapsed');
      var head=p.querySelector(':scope > .head');
      if(head){head.onclick=function(e){
        if(e.target&&e.target.closest('button,input,select'))return;
        p.classList.toggle('settings-collapsed');
      }}
    });
  }
  var oldRender=window.render;
  window.render=function(){oldRender();setTimeout(applySettingsCollapse,0)};
  document.addEventListener('click',function(){setTimeout(applySettingsCollapse,50)});
  setTimeout(applySettingsCollapse,300);
})();
</script>
