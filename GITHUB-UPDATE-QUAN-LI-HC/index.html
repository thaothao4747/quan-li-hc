function khoCoTonTheoHang(maHang){return state.kho.filter(function(k){return (state.ton[k[0]+'|'+maHang]||0)>0}).map(function(k){return [k[0],k[1]+' - tồn '+fmt(state.ton[k[0]+'|'+maHang]||0)]})}function capNhatKhoXuatTheoHang(){if(!el('hangXuat')||!el('khoXuat'))return;var ma=el('hangXuat').value;var ds=khoCoTonTheoHang(ma);if(ds.length){fill(el('khoXuat'),ds);if(el('goiYKhoXuat'))el('goiYKhoXuat').textContent='Chỉ hiển thị kho còn tồn của hàng đã chọn.'}else{el('khoXuat').innerHTML='';if(el('goiYKhoXuat'))el('goiYKhoXuat').textContent='Hàng này hiện chưa có tồn ở kho nào.'}}function bindForms(){['khoNhap','khoNhan'].forEach(function(id){if(el(id))fill(el(id),state.kho)});['hangNhap','hangXuat'].forEach(function(id){if(el(id))fill(el(id),state.hang.map(function(x){var h=normalizeHang(x);return [h[0],h[0]+' - '+h[1]]}))});if(el('hangXuat')){el('hangXuat').onchange=capNhatKhoXuatTheoHang;capNhatKhoXuatTheoHang();}if(el('nhomHang'))fillText(el('nhomHang'),state.nhomHangList);if(el('nhapNhomHangMoi'))fillText(el('nhapNhomHangMoi'),state.nhomHangList);if(el('dvt'))fillText(el('dvt'),state.dvtList);if(el('nhapDvtMoi'))fillText(el('nhapDvtMoi'),state.dvtList);if(el('loaiNhap'))fillText(el('loaiNhap'),state.loaiNhapList);if(el('nccNhap'))fillText(el('nccNhap'),state.nccList);if(el('loaiXuat'))fillText(el('loaiXuat'),state.loaiXuatList);bindKho('');bindKho('set');if(el('hangThietBi'))fill(el('hangThietBi'),itItems().length?itItems():state.hang.map(function(x){return [x[0],x[0]+' - '+x[1]]}));if(el('nguonThietBi'))fillText(el('nguonThietBi'),state.loaiNhapList.concat(['Điều chuyển nội bộ','Khác']));if(el('luuThietBi'))el('luuThietBi').onclick=saveThietBi;if(el('huyThietBi'))el('huyThietBi').onclick=resetThietBi;if(el('luuHang'))el('luuHang').onclick=saveHang;if(el('huyHang'))el('huyHang').onclick=resetHang;if(el('batHangMoi'))el('batHangMoi').onclick=function(){var box=el('hangMoiBox');var show=box.style.display==='none';box.style.display=show?'block':'none';el('hangNhap').d function bindSearchTon(){var input=el('timTon'),clear=el('xoaTimTon'),badge=el('soDongTon');if(!input)return;function apply(){var q=input.value.trim().toLowerCase();var rows=[].slice.call(document.querySelectorAll('#tonRowsBody tr'));var shown=0;rows.forEach(function(r){var ok=!q||r.getAttribute('data-search').indexOf(q)>=0;r.style.display=ok?'':'none';if(ok)shown++});if(badge)badge.textContent=shown+' dòng'}input.oninput=apply;if(clear)clear.onclick=function(){input.value='';apply();input.focus()};apply()}function bindKho(p){if(el(p+'luuKho'))el(p+'luuKho').onclick=function(){saveKho(p)};if(el(p+'huyKho'))el(p+'huyKho').onclick=function(){resetKho(p)}}function saveKho(p){if(!el(p+'maKho').value||!el(p+'tenKho').value)return alert('Nhập mã kho và tên kho');var i=el(p+'editKho').value;if(i==='')state.kho.push([el(p+'maKho').value,el(p+'tenKho').value,el(p+'ptKho').value||'Chưa gán']);else{state.kho[Number(i)][1]=el(p+'tenKho').value;state.kho[Number(i)][2]=el(p+'ptKho').value||'Chưa gán'}save();render()}function resetKho(p){[p+'editKho',p+'maKho',p+'tenKho',p+'ptKho'].forEach(function(id){if(el(id))el(id).value=''});if(el(p+'maKho'))el(p+'maKho').disabled=false}function editKho(i){go('kho');setTimeout(function(){fillKho('',i)},0)}function editKhoSetup(i){fillKho('set',i)}function fillKho(p,i){el(p+'editKho').value=i;el(p+'maKho').value=state.kho[i][0];el(p+'maKho').disabled=true;el(p+'tenKho').value=state.kho[i][1];el(p+'ptKho').value=state.kho[i][2]}
function editHang(i){var h=normalizeHang(state.hang[i]);el('editHang').value=i;el('maHang').value=h[0];el('maHang').disabled=true;el('tenHang').value=h[1];el('nhomHang').value=h[2];el('dvt').value=h[3];el('thuocTinh').value=h[4]}function resetHang(){['editHang','maHang','tenHang','thuocTinh'].forEach(function(id){el(id).value=''});el('maHang').disabled=false}function saveHang(){if(!el('maHang').value||!el('tenHang').value)return alert('Nhập mã hàng và tên hàng');var row=[el('maHang').value,el('tenHang').value,el('nhomHang').value,el('dvt').value,el('thuocTinh').value];var i=el('editHang').value;if(i==='')state.hang.push(row);else state.hang[Number(i)]=row;save();render()}

<script>
window.__autoOnlineSyncPatch=true;
(function(){
  var lastPush=0;
  var syncing=false;
  function toast(msg){
    var old=document.getElementById('syncToast');
    if(old)old.remove();
    var box=document.createElement('div');
    box.id='syncToast';
    box.textContent=msg;
    box.style.cssText='position:fixed;right:12px;bottom:74px;z-index:99;background:#10251d;color:#fff;padding:9px 12px;border-radius:8px;font-size:13px;box-shadow:0 8px 20px rgba(0,0,0,.18)';
    document.body.appendChild(box);
    setTimeout(function(){if(box&&box.parentNode)box.remove()},2200);
  }
  async function autoPush(){
    if(syncing || !window.dayDuLieuOnline)return;
    var now=Date.now();
    if(now-lastPush<1200)return;
    lastPush=now;
    syncing=true;
    try{await dayDuLieuOnline();toast('Đã tự đồng bộ online')}catch(e){console.warn(e);toast('Chưa đồng bộ được online')}
    syncing=false;
  }
  async function autoPullFirst(){
    if(sessionStorage.getItem('qlhc-online-pulled')==='1')return;
    if(!window.taiDuLieuOnline)return;
    sessionStorage.setItem('qlhc-online-pulled','1');
    try{await taiDuLieuOnline();toast('Đã tải dữ liệu online')}catch(e){console.warn(e)}
  }
  var oldSave=window.save;
  if(typeof oldSave==='function'){
    window.save=function(){
      oldSave.apply(this,arguments);
      setTimeout(autoPush,300);
    };
  }
  window.addEventListener('load',function(){setTimeout(autoPullFirst,900)});
  setTimeout(autoPullFirst,1200);
})();
</script>

      var hang=r[2]||[];var text=[nameKho(r[0]),r[1],hang[1],hang[2],hang[3],String(r[3])].join(' ').toLowerCase().replace(/"/g,'');
      return '<tr data-search="'+esc(text)+'"><td data-label="Kho"><span class="stock-warehouse">'+esc(nameKho(r[0]))+'</span></td><td data-label="Hàng tồn"><span class="stock-item-name">'+esc(hang[1])+'</span></td><td data-label="Số lượng" class="num stock-qty">'+fmt(r[3])+' '+esc(hang[3])+'</td></tr>';
    }).join('');
    body.innerHTML=rows||'<tr><td class="empty" colspan="3">Chưa có tồn kho.</td></tr>';
    var table=body.closest('table');
    if(table){table.classList.add('simple-stock-table');var head=table.querySelector('thead tr');if(head)head.innerHTML='<th>Kho</th><th>Hàng tồn</th><th class="num">Số lượng</th>'}
    if(typeof bindSearchTon==='function')bindSearchTon();
  }
  function afterRender(){addStyle();if(document.getElementById('tonRowsBody'))setTimeout(renderSimpleStock,0)}
  addStyle();
  var oldRender=window.render;
  if(typeof oldRender==='function'&&!oldRender.__simpleStockWrapped){
    window.render=function(){var out=oldRender.apply(this,arguments);afterRender();return out};
    window.render.__simpleStockWrapped=true;
  }
  setTimeout(afterRender,100);
})();
</script></body>
</html>
